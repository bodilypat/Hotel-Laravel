<!-- rooms.html
    - Room listing with details (number, type, status)
    - Form to add/edit rooms
    - JS to handle API communication for CRUD operations 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Rooms</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Hotel Management System - Rooms</h1>
    <div id="roomList">
        <!-- Room details will be displayed here -->
    </div>
    <form id="roomForm">
        <label for="roomNumber">Room Number:</label>
        <input type="text" id="roomNumber" name="roomNumber" required>

        <label for="roomType">Room Type:</label>
        <input type="text" id="roomType" name="roomType" required>

        <label for="roomStatus">Room Status:</label>
        <select id="roomStatus" name="roomStatus" required>
            <option value="">Select Status</option>
            <option value="available">Available</option>
            <option value="occupied">Occupied</option>
            <option value="maintenance">Maintenance</option>
        </select>

        <button type="submit">Add/Edit Room</button>
    </form>

    <script src="rooms.js"></script>
    
</html>
