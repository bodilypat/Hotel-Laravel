 <!-- billing.html
    - Billing details with itemized charges
    - JS to calculate totals, taxes, and discounts
    - Form to enter payment information
    - JS to handle payment submission and display confirmation
     -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Billing</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Hotel Management System - Billing</h1>
    <div id="billingDetails">
        <!-- Itemized charges will be displayed here -->
    </div>
    <form id="paymentForm">
        <label for="cardNumber">Card Number:</label>
        <input type="text" id="cardNumber" name="cardNumber" required>

        <label for="expiryDate">Expiry Date:</label>
        <input type="text" id="expiryDate" name="expiryDate" required>

        <label for="cvv">CVV:</label>
        <input type="text" id="cvv" name="cvv" required>

        <button type="submit">Pay Now</button>
    </form>

    <script src="billing.js"></script>
</html>
