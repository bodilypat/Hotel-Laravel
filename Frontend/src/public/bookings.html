<!-- bookings.html
    - Booking form with fields for room selection, dates, and customer
    - JS to fetch available rooms and customers on page load
    - JS to handle form submission, validation, and API communication 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Bookings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Hotel Management System - Bookings</h1>
    <form id="bookingForm">
        <label for="customer">Customer:</label>
        <select id="customer" name="customer" required>
            <option value="">Select Customer</option>
        </select>

        <label for="room">Room:</label>
        <select id="room" name="room" required>
            <option value="">Select Room</option>
        </select>

        <label for="checkin">Check-in Date:</label>
        <input type="date" id="checkin" name="checkin" required>

        <label for="checkout">Check-out Date:</label>
        <input type="date" id="checkout" name="checkout" required>

        <button type="submit">Book Now</button>
    </form>

    <script src="bookings.js"></script>
</body>
</html>
