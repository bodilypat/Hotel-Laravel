<!-- guest.html
    - Customer list with details (name, contact info, booking history)
    - Form to add/edit customer information
    - JS to handle API communication for CRUD operations and linking bookings
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Guests</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Hotel Management System - Guests</h1>
    <div id="guestList">
        <!-- Guest details will be displayed here -->
    </div>
    <form id="guestForm">
        <label for="guestName">Name:</label>
        <input type="text" id="guestName" name="guestName" required>

        <label for="guestContact">Contact Info:</label>
        <input type="text" id="guestContact" name="guestContact" required>

        <button type="submit">Add/Edit Guest</button>
    </form>

    <script src="guests.js"></script>
</html>
